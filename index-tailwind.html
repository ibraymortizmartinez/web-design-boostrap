<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Contacto - Tailwind CSS</title>
    <link rel="icon" type="image/png" href="./assets/img/solicitud.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'brand-blue': '#1e3a8a',    /* Azul oscuro para títulos */
                        'brand-primary': '#0d6efd', /* Azul brillante tipo Bootstrap */
                        'brand-bg': '#f0f4f8'       /* Color de fondo */
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg min-h-screen flex flex-col font-sans text-gray-800">

    <nav class="bg-gray-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="#" class="flex items-center font-bold text-xl tracking-wide">
                    <i class="fa-solid fa-spinner text-brand-primary mr-2 text-2xl"></i> ConnectTech
                </a>
                
                <div class="hidden md:flex space-x-8 text-sm font-semibold tracking-wide items-center">
    <a href="#" class="hover:text-brand-primary transition-colors">INICIO</a>
    <a href="#" class="hover:text-brand-primary transition-colors">SERVICIOS</a>
    <a href="#" class="hover:text-brand-primary transition-colors">NOSOTROS</a>
    <a href="#" class="text-brand-primary">CONTACTO</a>
    
    <div class="ml-6 flex items-center mt-4 md:mt-0">
    <a href="index.html" 
       class="bg-[#7952b3] hover:bg-[#614092] text-white rounded-full font-bold shadow-sm px-4 py-2 flex items-center text-sm transition-transform hover:scale-105">
        <i class="fa-brands fa-bootstrap mr-2 text-base"></i> Versión Bootstrap
    </a>
</div>
</div>
                
                <div class="md:hidden flex items-center">
                    <button class="text-gray-300 hover:text-white focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center py-10 px-4">
        
        <h1 class="text-brand-blue font-bold text-3xl md:text-4xl mb-8 tracking-wide text-center">
            SOLICITUD DE CONTACTO
        </h1>

        <div class="w-full max-w-lg bg-white rounded-2xl shadow-2xl overflow-hidden">
            
            <div class="bg-gradient-to-r from-indigo-100 to-indigo-200 px-6 py-4 flex items-center border-b border-indigo-50">
                <i class="fa-regular fa-address-book text-brand-blue text-xl mr-3"></i>
                <h5 class="text-brand-blue font-bold text-sm md:text-base mb-0">
                    FORMULARIO DE REGISTRO (5 DATOS)
                </h5>
            </div>

            <div class="p-6 md:p-8">
                <form class="space-y-5">
                    
                    <div>
                        <label class="block text-sm font-semibold mb-1">Nombre Completo</label>
                        <div class="flex border border-gray-300 rounded-lg overflow-hidden focus-within:border-brand-primary focus-within:ring-1 focus-within:ring-brand-primary transition-all">
                            <span class="bg-gray-50 flex items-center justify-center px-4 text-brand-primary border-r border-gray-300">
                                <i class="fa-solid fa-user-astronaut"></i>
                            </span>
                            <input type="text" class="w-full py-2 px-3 outline-none" placeholder="Ej: Juan Pérez">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Correo Electrónico</label>
                        <div class="flex border border-gray-300 rounded-lg overflow-hidden focus-within:border-brand-primary focus-within:ring-1 focus-within:ring-brand-primary transition-all">
                            <span class="bg-gray-50 flex items-center justify-center px-4 text-brand-primary border-r border-gray-300">
                                <i class="fa-solid fa-envelope-open"></i>
                            </span>
                            <input type="email" class="w-full py-2 px-3 outline-none" placeholder="ejemplo@correo.com">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Teléfono Móvil</label>
                        <div class="flex border border-gray-300 rounded-lg overflow-hidden focus-within:border-brand-primary focus-within:ring-1 focus-within:ring-brand-primary transition-all">
                            <span class="bg-gray-50 flex items-center justify-center px-4 text-brand-primary border-r border-gray-300">
                                <i class="fa-solid fa-phone"></i>
                            </span>
                            <input type="tel" class="w-full py-2 px-3 outline-none" placeholder="912 345 678">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Empresa/Organización</label>
                        <div class="flex border border-gray-300 rounded-lg overflow-hidden focus-within:border-brand-primary focus-within:ring-1 focus-within:ring-brand-primary transition-all">
                            <span class="bg-gray-50 flex items-center justify-center px-4 text-brand-primary border-r border-gray-300">
                                <i class="fa-solid fa-city"></i>
                            </span>
                            <input type="text" class="w-full py-2 px-3 outline-none" placeholder="Nombre de su Empresa">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold mb-1">Mensaje o Consulta</label>
                        <div class="flex border border-gray-300 rounded-lg overflow-hidden focus-within:border-brand-primary focus-within:ring-1 focus-within:ring-brand-primary transition-all">
                            <span class="bg-gray-50 flex items-start justify-center px-4 pt-3 text-brand-primary border-r border-gray-300">
                                <i class="fa-regular fa-message"></i>
                            </span>
                            <textarea class="w-full py-2 px-3 outline-none resize-y" rows="3" placeholder="Escriba su mensaje aquí..."></textarea>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-brand-primary hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-full shadow-md transition-all transform hover:-translate-y-0.5 flex items-center justify-center mt-2">
                        ENVIAR MENSAJE <i class="fa-regular fa-paper-plane ml-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-6 border-t border-gray-800 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center text-center md:text-left">
            <div class="mb-4 md:mb-0">
                <h6 class="font-bold text-brand-primary text-sm mb-1">Desarrollado por el programador: Angel Ibraym Ortiz Martinez.</h6>
                <p class="text-gray-400 text-xs">
                    <i class="fa-solid fa-laptop-code mr-1"></i> Frontend Developer | &copy; 2026 ConnectTech
                </p>
            </div>
            
            <div class="flex space-x-4 text-xl">
                <a href="#" class="text-gray-400 hover:text-brand-primary hover:-translate-y-1 transition-transform"><i class="fa-regular fa-envelope"></i></a>
                <a href="#" class="text-gray-400 hover:text-brand-primary hover:-translate-y-1 transition-transform"><i class="fa-brands fa-github"></i></a>
                <a href="#" class="text-gray-400 hover:text-brand-primary hover:-translate-y-1 transition-transform"><i class="fa-brands fa-linkedin"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>

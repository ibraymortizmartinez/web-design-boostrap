    <main class="main-wrapper flex-grow-1 d-flex flex-column align-items-center justify-content-center py-5">
        
        <h1 class="main-title mb-4 text-center">SOLICITUD DE CONTACTO</h1>

        <div class="card form-card shadow-lg border-0">
            
            <div class="card-header form-header border-0 d-flex align-items-center px-4 py-3">
                <i class="fa-regular fa-address-book text-dark-blue fs-5 me-2"></i>
                <h5 class="mb-0 fw-bold text-dark-blue fs-6">FORMULARIO DE REGISTRO (5 DATOS)</h5>
            </div>

            <div class="card-body px-4 py-4">
                <form>
                    <div class="mb-3">
                        <label class="form-label fw-semibold fs-sm">Nombre Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary border-end-0"><i class="fa-solid fa-user-astronaut"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" placeholder="Ej: Juan Pérez">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold fs-sm">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary border-end-0"><i class="fa-solid fa-envelope-open"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" placeholder="ejemplo@correo.com">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold fs-sm">Teléfono Móvil</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary border-end-0"><i class="fa-solid fa-phone"></i></span>
                            <input type="tel" class="form-control border-start-0 ps-0" placeholder="912 345 678">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold fs-sm">Empresa/Organización</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary border-end-0"><i class="fa-solid fa-city"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" placeholder="Nombre de su Empresa">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold fs-sm">Mensaje o Consulta</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary border-end-0 align-items-start pt-2"><i class="fa-regular fa-message"></i></span>
                            <textarea class="form-control border-start-0 ps-0" rows="3" placeholder="Escriba su mensaje aquí..."></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-submit fw-bold py-2 shadow-sm">
                        ENVIAR MENSAJE <i class="fa-regular fa-paper-plane ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

                    <a href="https://github.com/tu-usuario" target="_blank" class="text-white opacity-75 text-decoration-none mx-2 fs-5" title="Mi GitHub">

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Contacto - ConnectTech</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> -->

    <link rel="stylesheet" href="./assets/css/boostrap.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-transparent pt-3 px-md-5">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold text-primary d-flex align-items-center" href="#">
                <i class="fa-solid fa-circle-notch fs-3 me-2"></i> ConnectTech
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav fw-semibold" style="font-size: 0.9rem;">
                    <li class="nav-item"><a class="nav-link text-dark mx-2" href="#">INICIO</a></li>
                    <li class="nav-item"><a class="nav-link text-dark mx-2" href="#">SERVICIOS</a></li>
                    <li class="nav-item"><a class="nav-link text-dark mx-2" href="#">NOSOTROS</a></li>
                    <li class="nav-item"><a class="nav-link text-primary mx-2" href="#">CONTACTO</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-wrapper d-flex flex-column align-items-center justify-content-center">
        
        <h1 class="main-title mb-4 text-center">SOLICITUD DE CONTACTO</h1>

        <div class="card form-card shadow-lg border-0">
            
            <div class="card-header form-header border-0 d-flex align-items-center px-4 py-3">
                <i class="fa-solid fa-address-book fs-5 me-2 text-dark-blue"></i>
                <h5 class="mb-0 fw-bold text-dark-blue fs-6">FORMULARIO DE REGISTRO (5 DATOS)</h5>
            </div>

            <div class="card-body px-4 py-4">
                <form>
                    <div class="mb-3">
                        <label class="form-label fw-semibold fs-sm">Nombre Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary border-end-0"><i class="fa-solid fa-user"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" placeholder="Ej: Juan Pérez">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold fs-sm">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary border-end-0"><i class="fa-solid fa-envelope-open"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" placeholder="ejemplo@correo.com">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold fs-sm">Teléfono Móvil</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary border-end-0"><i class="fa-solid fa-phone"></i></span>
                            <input type="tel" class="form-control border-start-0 ps-0" placeholder="912 345 678">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold fs-sm">Empresa/Organización</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary border-end-0"><i class="fa-regular fa-building"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" placeholder="Nombre de su Empresa">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold fs-sm">Mensaje o Consulta</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-primary border-end-0 align-items-start pt-2"><i class="fa-solid fa-comment-dots"></i></span>
                            <textarea class="form-control border-start-0 ps-0" rows="3" placeholder="Escriba su mensaje aquí..."></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-submit fw-bold py-2 shadow-sm">
                        ENVIAR MENSAJE <i class="fa-solid fa-paper-plane ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
